version: "3.8"

# Full Grafana observability stack for local development.
# Traces  → Tempo   (OTLP gRPC :4317)
# Logs    → Loki    (HTTP :3100)
# Metrics → Prometheus scrapes :9090/metrics
# UI      → Grafana :3000  (admin / admin)

services:

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - loki
      - tempo
      - prometheus

  loki:
    image: grafana/loki:2.9.4
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml

  tempo:
    image: grafana/tempo:2.4.1
    ports:
      - "4317:4317"  # OTLP gRPC (traces)
      - "3200:3200"  # Tempo HTTP API (queried by Grafana)
    command: -config.file=/etc/tempo/tempo.yaml
    volumes:
      - ./grafana/tempo.yaml:/etc/tempo/tempo.yaml

  prometheus:
    image: prom/prometheus:v2.51.0
    ports:
      - "9090:9090"
    volumes:
      - ./grafana/prometheus.yml:/etc/prometheus/prometheus.yml
    extra_hosts:
      - "host.docker.internal:host-gateway"